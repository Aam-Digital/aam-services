openapi: 3.0.3
info:
  title: Template Export API
  description: REST API for handling export operations related to templates in Aam.
  version: 1.0.0
servers:
  - url: /v1/export

paths:
  /template:
    post:
      summary: Post a new template
      description: Registers a template file. Creating the TemplateExport entity is handled by the client, not by this endpoint through the server.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                template:
                  type: string
                  format: binary
                  description: The template file to upload
      responses:
        '200':
          description: Template registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  templateId:
                    type: string
                    description: The external identifier of the implementing TemplateEngine
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /template/{templateId}:
    get:
      summary: Fetch an existing template file
      description: Get the uploaded template file with its placeholders (not a generated document filled with data based on the template).
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            The uploaded template file. The response Content-Type is the template's own
            media type (e.g. a Word document).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /render/{templateId}:
    post:
      summary: Render an existing template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderRequest'
      responses:
        '200':
          description: >-
            The rendered document. The response Content-Type matches the requested
            `convertTo` format (e.g. application/pdf).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /render-batch/{templateId}:
    post:
      summary: Render an existing template for multiple data sets (batch)
      description: >-
        Renders the template once per entry in the `data` array and returns the
        results either as a ZIP of N independently rendered files (`mode=zip`,
        the default) or as a single combined document (`mode=combined`).
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          description: >-
            `zip` (default) returns a ZIP of N rendered files; `combined` returns
            a single merged document produced by Carbone.
          schema:
            type: string
            enum:
              - zip
              - combined
            default: zip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderBatchRequest'
      responses:
        '200':
          # UNVERIFIED: no e2e exercises the batch success path — the test Carbone engine
          # does not support batch rendering, so the actual ZIP/combined Content-Type has
          # not been confirmed against a real response. See CONTRACT-RECONCILIATION-BACKLOG.md.
          description: >-
            The rendered documents. The response Content-Type is a ZIP archive for
            `mode=zip` or the combined document's own media type for `mode=combined`.
          content:
            application/zip:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid `mode`, or a body whose `data` field is missing, not an array, or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Carbone rejected the batch (e.g. over the configured per-batch limit, or batch disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    RenderRequest:
      type: object
      required:
        - convertTo
      properties:
        convertTo:
          type: string
          description: The format to convert the template to, e.g. "pdf".
          example: pdf
        data:
          type: object
          additionalProperties: true
          description: Placeholder values injected into the template.
        reportName:
          type: string
          description: Optional output file name (supports carbone placeholders).
    RenderBatchRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
          description: One record per document to render. Must contain at least one entry.
        convertTo:
          type: string
          description: The per-document output format, e.g. "pdf".
          example: pdf
        reportName:
          type: string
          description: Optional output file name (supports carbone placeholders).
    Error:
      type: object
      properties:
        errorCode:
          type: string
        errorMessage:
          type: string
