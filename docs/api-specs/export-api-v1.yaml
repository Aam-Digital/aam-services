openapi: 3.0.3
info:
  title: Template Export API
  description: REST API for handling export operations related to templates in Aam.
  version: 1.0.0
servers:
  - url: /v1/export

paths:
  /template:
    post:
      summary: Post a new template
      description: Registers a template file. Creating the TemplateExport entity is handled by the client, not by this endpoint through the server.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                template:
                  type: string
                  format: binary
                  description: The template file to upload
      responses:
        '200':
          description: Template registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  templateId:
                    type: string
                    description: The external identifier of the implementing TemplateEngine
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /template/{templateId}:
    get:
      summary: Fetch an existing template file
      description: Get the uploaded template file with its placeholders (not a generated document filled with data based on the template).
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            The uploaded template file. The response Content-Type is the template's own
            media type (e.g. a Word document).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /render/{templateId}:
    post:
      summary: Render an existing template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderRequest'
      responses:
        '200':
          description: >-
            The rendered document. The response Content-Type matches the requested
            `convertTo` format (e.g. application/pdf).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /render-batch/{templateId}:
    post:
      summary: Render an existing template for multiple data sets (batch)
      description: >-
        Renders the template once per entry in the `data` array and returns the
        results either as a ZIP of N independently rendered files (`mode=zip`,
        the default) or as a single combined document (`mode=combined`).
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          description: >-
            `zip` (default) returns a ZIP of N rendered files; `combined` returns
            a single merged document produced by Carbone.
          schema:
            type: string
            enum:
              - zip
              - combined
            default: zip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderBatchRequest'
      responses:
        '200':
          # UNVERIFIED: no e2e exercises the batch success path — the test Carbone engine
          # does not support batch rendering, so the actual ZIP/combined Content-Type has
          # not been confirmed against a real response. See CONTRACT-RECONCILIATION-BACKLOG.md.
          description: >-
            The rendered documents, returned as a binary stream whose packaging depends on
            `mode`:

            * `mode=zip` (default) — a ZIP archive (`application/zip`) containing one
              independently rendered file per entry in the request `data` array.
            * `mode=combined` — a single document (a merged PDF for the current Carbone
              configuration) holding all rendered records in one file.

            The exact response `Content-Type` is produced by the template engine and has
            not yet been confirmed against a live batch render (see the UNVERIFIED note
            above); `application/octet-stream` is listed as the generic streaming fallback.
          content:
            application/zip:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid `mode`, or a body whose `data` field is missing, not an array, or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                errorCode: INVALID_MODE
                errorMessage: "Unsupported mode 'foo'. Allowed values: zip, combined."
        '401':
          description: No valid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                errorCode: invalid_token
                errorMessage: Unauthorized
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                errorCode: NOT_FOUND_ERROR
                errorMessage: Template not found
        '422':
          description: Carbone rejected the batch (e.g. over the configured per-batch limit, or batch disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                errorCode: BATCH_REJECTED_ERROR
                errorMessage: Batch processing deactivated
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                errorCode: INTERNAL_SERVER_ERROR
                errorMessage: An unexpected error occurred.

components:
  schemas:
    RenderRequest:
      type: object
      required:
        - convertTo
      properties:
        convertTo:
          type: string
          description: The format to convert the template to, e.g. "pdf".
          example: pdf
        data:
          type: object
          additionalProperties: true
          description: Placeholder values injected into the template.
        reportName:
          type: string
          description: Optional output file name (supports carbone placeholders).
    RenderBatchRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
          description: One record per document to render. Must contain at least one entry.
        convertTo:
          type: string
          description: The per-document output format, e.g. "pdf".
          example: pdf
        reportName:
          type: string
          description: Optional output file name (supports carbone placeholders).
      example:
        data:
          - firstname: Ada
            lastname: Lovelace
          - firstname: Alan
            lastname: Turing
        convertTo: pdf
        reportName: "report-{d.lastname}.pdf"
    Error:
      type: object
      description: Standard error envelope returned for every non-2xx response in this API.
      properties:
        errorCode:
          type: string
          description: >-
            Machine-readable error identifier; branch on this rather than on
            `errorMessage`. Possible values:

            * `NOT_FOUND_ERROR` — the referenced template does not exist (`404`).
            * `INVALID_MODE` — the `mode` query parameter is not one of `zip`/`combined`
              (`400`, render-batch only).
            * `INVALID_DATA_SHAPE_ERROR` — the request body is not a JSON object, or its
              `data` field is missing or not an array (`400`, render-batch only).
            * `EMPTY_DATA_LIST_ERROR` — the `data` array is present but empty (`400`,
              render-batch only).
            * `BATCH_REJECTED_ERROR` — the template engine refused the batch (e.g. the
              array exceeds the configured per-batch limit, or batch rendering is
              disabled); the engine's message is propagated in `errorMessage` (`422`,
              render-batch only).
            * `FETCH_TEMPLATE_FAILED_ERROR`, `CREATE_RENDER_REQUEST_FAILED_ERROR`,
              `FETCH_RENDER_ID_REQUEST_FAILED_ERROR`, `PARSE_RESPONSE_ERROR`,
              `CREATE_TEMPLATE_REQUEST_FAILED_ERROR`, `FETCH_TEMPLATE_REQUEST_FAILED_ERROR`
              — an upstream call to the template engine or storage failed while creating,
              fetching, or rendering (`500`).
            * `INTERNAL_SERVER_ERROR` — an unclassified server-side failure (`500`).

            On `401` responses the value is instead the standard OAuth2 bearer-token error
            code (e.g. `invalid_token`) or, when no OAuth2 error is available, the literal
            HTTP status `"401"`.
          example: NOT_FOUND_ERROR
        errorMessage:
          type: string
          description: >-
            Human-readable description of the failure, intended for logging/debugging
            rather than programmatic branching.
          example: Template not found
