openapi: 3.1.0
info:
  title: Aam Digital Third-Party Authentication API
  description: User Authentication by external authentication provider
  version: 1.0.0
servers:
  - url: https://api.aam-digital.dev/v1/authentication
    description: Development
  - url: https://api.aam-digital.app/v1/authentication
    description: Production
paths:
  /session:
    post:
      summary: Start a aam-digital sign-in flow for an externally authenticated user.
      tags:
        - third-party-authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSessionRequest'
      responses:
        200:
          description: User Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSession'
        401:
          description: No Authentication provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: No permissions to authenticate users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /session/{sessionId}:
    get:
      summary: Validate a session. This only works once.
      tags:
        - third-party-authentication
      parameters:
        - $ref: '#/components/parameters/sessionId'
        - $ref: '#/components/parameters/sessionToken'
      responses:
        200:
          description: User Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionDataDto'
        401:
          description: No Authentication provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: No permissions to authenticate users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /session/{sessionId}/redirect:
    get:
      summary: Get the redirectUrl for a session. This needs a user based authentication.
      tags:
        - third-party-authentication
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        200:
          description: User Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionRedirectDto'
        401:
          description: No Authentication provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: No permissions to authenticate users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    sessionId:
      in: path
      name: "sessionId"
      description: "Unique identifier of the session"
      schema:
        type: string
      required: true
    sessionToken:
      in: query
      name: "session_token"
      description: "Secret for session. Belongs to the session"
      schema:
        type: string
      required: true

  schemas:
    UserSessionRequest:
      type: object
      required:
        - userId
        - firstName
        - lastName
        - redirectUrl
        - email
      properties:
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        redirectUrl:
          type: string
        email:
          type: string
          format: email
        additionalData:
          type: object
          additionalProperties: true
    UserSession:
      type: object
      required:
        - sessionId
        - sessionToken
        - entryPointUrl
        - validUntil
      properties:
        sessionId:
          type: string
          format: uuid
        sessionToken:
          type: string
        entryPointUrl:
          type: string
          format: uri
        validUntil:
          type: string
          format: date-time
    UserSessionDataDto:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
    UserSessionRedirectDto:
      type: object
      required:
        - redirectUrl
      properties:
        redirectUrl:
          type: string
          format: uri
    Error:
      type: object
      properties:
        errorCode:
          type: string
          description: Machine-readable error code (business code or HTTP status string).
        errorMessage:
          type: string