spring:
  application:
    name: aam-backend-service
  main:
    banner-mode: off
  jackson:
    deserialization:
      accept-empty-string-as-null-object: true
      read-unknown-enum-values-using-default-value: true
  rabbitmq:
    listener:
      simple:
        prefetch: 1
  datasource:
    driver-class-name: org.postgresql.Driver
    username: admin
    password: docker
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB

server:
  servlet:
    context-path: /
  port: 9000

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - info
          - health
  tracing:
    sampling:
      probability: 0

aam-render-api-client-configuration:
  auth-config:
    client-id: dummy-client
    client-secret: client-secret
    token-endpoint: /realms/dummy-realm/protocol/openid-connect/token
    grant-type: client_credentials
    scope:

couch-db-client-configuration:
  base-path: http://localhost:5984
  basic-auth-username: admin
  basic-auth-password: docker

sqs-client-configuration:
  base-path: http://localhost:4984
  basic-auth-username: admin
  basic-auth-password: docker

skilllab-api-client-configuration:
  api-key: skilllab-api-key
  project-id: dummy-project
  base-path: http://localhost:9005/skilllab # todo test container
  response-timeout-in-seconds: 15

notification-firebase-configuration:
  # Throwaway, non-functional service-account credential (a freshly generated RSA key for a
  # nonexistent project — NOT a real secret). Firebase mode is enabled below so the
  # /v1/notification/message/device-test endpoint exists for the contract e2e test. The
  # credential only needs to be structurally parseable: FirebaseApp.initializeApp() is lazy
  # and the test exercises the no-registered-devices path, which never calls FCM.
  credential-file-base64: ""

aam-replication-backend-client-configuration:
  base-path: ""

features:
  reporting:
    enabled: true
  export-api:
    enabled: true
  notification-api:
    enabled: true
    # firebase mode activates the push beans + NotificationAdminController so the contract
    # e2e suite can exercise POST /v1/notification/message/device-test. Independent of the
    # email flag below (email tests are unaffected). Uses the throwaway credential above.
    mode: firebase
    email:
      enabled: true
  skill-api:
    mode: disabled

crypto-configuration:
  secret: super-duper-secret

database-change-detection:
  fixed-delay: 1000

keycloak:
  realm: dummy-realm
  client-id: aam-backend
  client-secret: 1234
  server-url: https://keycloak.localhost

sentry:
  logging:
    enabled: false

# sentry version
application:
  base-url: https://aam.localhost

logging:
  level:
    com.aamdigital.aambackendservice: warn
