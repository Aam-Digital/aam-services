spring:
  application:
    name: aam-backend-service
  main:
    banner-mode: off
  jackson:
    deserialization:
      accept-empty-string-as-null-object: true
      read-unknown-enum-values-using-default-value: true
  rabbitmq:
    listener:
      simple:
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 10000
          multiplier: 2.0
          max-interval: 60000
  mail:
    properties:
      mail:
        smtp:
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB

server:
  servlet:
    context-path: /api

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - info
          - health
          - features
  tracing:
    sampling:
      probability: 1

features:
  reporting:
    enabled: true
  export-api:
    enabled: false
  skill-api:
    mode: disabled
  notification-api:
    enabled: false
    email:
      enabled: false
  third-party-authentication:
    enabled: false

notification-firebase-configuration:
  link-base-url: ${application.base-url}

notification:
  email:
    from: ""
    subject-prefix: Aam Digital
    manage-settings-url: "${application.base-url}/user-account?tabIndex=1"
    # Deployment-wide language for the email boilerplate (e.g. en, de, fr).
    # Selects the bundled/overridden template under {locale}/notification/...
    # Keep this in sync with the site default language (SiteSettings.defaultLanguage).
    locale: en

aam-render-api-client-configuration:
  auth-config:
    # default standard values that can be emitted from the environment
    grant-type: client_credentials
    scope: ""

aam-replication-backend-client-configuration:
  base-path: ""


logging:
  logback:
    rollingpolicy:
      max-file-size: 50MB
      total-size-cap: 50MB
      clean-history-on-start: true

application:
  base-url: "" # default for backwards compatibility - this should be set in env however!

---
# <second part of the config, just active with profile "local-development">

spring:
  config:
    activate:
      on-profile: local-development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://keycloak.localhost/realms/dummy-realm
  ssl:
    bundle:
      pem:
        local-development:
          truststore:
            certificate: "classpath:reverse-proxy.crt" # this is the certificate of the local running caddy proxy
  rabbitmq:
    virtual-host: local
    listener:
      direct:
        retry:
          enabled: true
          max-attempts: 5
      simple:
        observation-enabled: true
    username: local-spring
    password: docker
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  datasource:
    url: jdbc:postgresql://localhost:5402/aam-backend-service
    username: admin
    password: docker

server:
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  port: 9000

logging:
  level:
    #    org.springframework.amqp.rabbit: warn
    #    org.springframework.web: debug
    #    org.springframework.http: debug
    #    org.springframework.security: debug
    com.aamdigital.aambackendservice: trace

aam-render-api-client-configuration:
  base-path: https://aam.localhost/carbone-io
# you can also use https://pdf.aam-digital.dev
  auth-config:
    client-id: aam-backend-pdf-client
#   client-secret: <needs-environment-configuration>
    token-endpoint: https://keycloak.localhost/realms/aam-digital/protocol/openid-connect/token

aam-replication-backend-client-configuration:
  base-path: https://aam.localhost/db
  basic-auth-username: admin
  basic-auth-password: docker

couch-db-client-configuration:
  base-path: https://aam.localhost/db/couchdb
  basic-auth-username: admin
  basic-auth-password: docker

sqs-client-configuration:
  base-path: https://aam.localhost/sqs
  basic-auth-username: admin
  basic-auth-password: docker

skilllab-api-client-configuration:
  api-key: skilllab-api-key
  project-id: dummy-project
  base-path: https://aam.localhost/skilllab
  response-timeout-in-seconds: 15

features:
  export-api:
    enabled: true
  skill-api:
    mode: disabled
  notification-api:
    enabled: true
    mode: firebase
    email:
      enabled: true
  third-party-authentication:
    enabled: true

keycloak:
  realm: dummy-realm
  client-id: aam-backend
  client-secret: 1234
  server-url: https://keycloak.localhost

crypto-configuration:
  secret: super-duper-secret

sentry:
  logging:
    enabled: false

application:
  base-url: https://aam.localhost

