<div style="font-family: Arial, sans-serif; max-width: 640px; margin: 0 auto; color: #1f2937; line-height: 1.5">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse">
        <tr>
            <td style="padding: 20px 0 8px 0; text-align: center">
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto; border-collapse: collapse">
                    <tr>
                        <td style="vertical-align: bottom; text-align: left">
                            <span style="font-size: 26px; font-weight: 400; line-height: 1; color: #111827"
                                ><span style="color: #ff9800">Aam</span> Digital</span
                            >
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td style="padding: 0 0 18px 0">
                <p style="margin: 0 0 12px 0">There is a new update in your workspace:</p>
                <p style="margin: 0 0 20px 0; font-size: 16px"><strong>{{TITLE}}</strong></p>
                <p style="margin: 0 0 24px 0">
                    <a
                        href="{{ACTION_URL}}"
                        style="
                            background: #ff9800;
                            color: white;
                            text-decoration: none;
                            padding: 10px 16px;
                            border-radius: 4px;
                            display: inline-block;
                            font-weight: 600;
                        "
                        >Open in Aam Digital</a
                    >
                </p>
                <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 0 0 16px 0" />
                <p style="margin: 0; font-size: 13px; color: #6b7280">
                    You received this email because notifications are enabled in your Aam Digital account. You can
                    <a href="{{MANAGE_SETTINGS_URL}}" style="color: #ff9800">manage your notification settings</a>
                    at any time.
                </p>
            </td>
        </tr>
    </table>
</div>
