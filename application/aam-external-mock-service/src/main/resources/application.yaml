spring:
  application:
    name: aam-external-mock-service
  main:
    banner-mode: off
  jackson:
    deserialization:
      accept-empty-string-as-null-object: true
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - info
          - health
  tracing:
    sampling:
      probability: 1

---

spring:
  config:
    activate:
      on-profile: local-development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/dummy-realm
  jpa:
    hibernate:
      ddl-auto: create-drop
  datasource:
    url: jdbc:postgresql://localhost:5666/postgres
    username: docker
    password: docker

server:
  error:
    include-message: always
    include-binding-errors: always
  port: 9005

logging:
  level:
    #    org.springframework.web: debug
    #    org.springframework.http: debug
    com.aamdigital.aamexternalmockservice: trace

#management:
#  otlp:
#    tracing:
#      endpoint: http://localhost:4318/v1/traces

skilllab-auth-config:
  header-name: "Authorization"
  header-value: "Bearer skilllab-api-key"
